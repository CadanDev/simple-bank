<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Meu Projeto</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Meu Site</a>
		</div>
	</nav>

	<main>
		<section class="container my-5">
			<h1>Bem-vindo</h1>
			<div class="row">
				<div class="col-lg-6">
					<div class="card mb-3">
						<div class="card-body">
							<h5 class="card-title">Testador de Endpoints</h5>
							<form id="api-form">
								<div class="mb-2">
									<select id="http-method" class="form-select">
										<option>GET</option>
										<option>POST</option>
										<option>PUT</option>
										<option>DELETE</option>
									</select>
								</div>
								<div class="mb-2">
									<input id="api-base" class="form-control" placeholder="API base URL (ex: http://localhost:8001)" value="">
								</div>
								<div class="mb-2">
									<input id="api-url" class="form-control" placeholder="/event or full URL" value="/event">
								</div>
								<div class="mb-2">
									<textarea id="api-body" class="form-control" rows="6" placeholder='{"type":"deposit","destination":"100","amount":10}'></textarea>
								</div>
								<div class="d-flex gap-2">
									<button class="btn btn-primary" id="send-btn" type="submit">Enviar</button>
									<button class="btn btn-outline-secondary" type="button" id="preset-reset">Preset: Reset</button>
									<button class="btn btn-outline-secondary" type="button" id="preset-balance">Preset: Balance</button>
									<button class="btn btn-outline-secondary" type="button" id="preset-event">Preset: Event</button>
								</div>
							</form>
						</div>
					</div>
				</div>
				<div class="col-lg-6">
					<div class="card mb-3">
						<div class="card-body">
							<h5 class="card-title">Resposta</h5>
							<div class="mb-2"><strong>Status / Cabeçalhos</strong></div>
							<div id="api-headers" class="small mb-2"></div>
							<div class="mb-2"><strong>Body</strong></div>
							<pre id="api-response" class="bg-light p-2" style="max-height:400px;overflow:auto;"></pre>
							<div id="message-log" class="mt-2"></div>
						</div>
					</div>
				</div>
			</div>
		</section>
	</main>

	<footer class="bg-dark text-white text-center py-4">
		<p>&copy; 2026 Lucas Gabriel Cadan</p>
	</footer>

	<script src="main.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
