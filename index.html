<!doctype html>
<html lang="pt-br">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>API Test Runner</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="container">
		<h1>API Test Runner</h1>

		<div class="panels">
		<section class="controls">
			<div class="group">
				<h2>Reset</h2>
				<button id="btn-reset">POST /api/reset</button>
			</div>

			<div class="group">
				<h2>Balance</h2>
				<label>Account id: <input id="balance-id" value="1234"></label>
				<button id="btn-balance">GET /api/balance</button>
			</div>

			<div class="group">
				<h2>Deposit</h2>
				<label>Destination: <input id="deposit-dest" value="100"></label>
				<label>Amount: <input id="deposit-amount" type="number" value="10"></label>
				<button id="btn-deposit">POST /api/event (deposit)</button>
			</div>

			<div class="group">
				<h2>Withdraw</h2>
				<label>Origin: <input id="withdraw-origin" value="100"></label>
				<label>Amount: <input id="withdraw-amount" type="number" value="5"></label>
				<button id="btn-withdraw">POST /api/event (withdraw)</button>
			</div>

			<div class="group">
				<h2>Transfer</h2>
				<label>Origin: <input id="transfer-origin" value="100"></label>
				<label>Destination: <input id="transfer-dest" value="300"></label>
				<label>Amount: <input id="transfer-amount" type="number" value="15"></label>
				<button id="btn-transfer">POST /api/event (transfer)</button>
			</div>

			<div class="group">
				<h2>Requests</h2>
				<button id="btn-run-sequence">Run sequence from spec</button>
			</div>
		</section>

		<section class="output">
			<h2>Resposta</h2>
			<div id="response-list" class="response-list"></div>
		</section>
		</div>

	</main>
	<script src="main.js"></script>
</body>
</html>
